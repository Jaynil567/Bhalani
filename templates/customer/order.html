<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Place Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .navbar {
            margin-left: 220px;
        }

        @media(max-width:768px) {

            .navbar {
                margin-left: 0;
            }

        }

        .logo-circle {
            width: 35px;
            height: 35px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        #loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        @media(max-width:768px) {

            .sidebar {
                left: -220px;
                transition: 0.3s;
            }

            .sidebar.active {
                left: 0;
            }

            .navbar {
                margin-left: 220px;
                padding-left: 15px;
                padding-right: 15px;
            }

            @media(max-width:768px) {

                .navbar {
                    margin-left: 0;
                    width: 100%;
                }

            }

            .content {
                margin-left: 0;
            }

        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 998;
        }

        .sidebar {
            z-index: 999;
        }
    </style>

</head>

<body>


    <div class="sidebar" id="sidebar">

        <h4 class="text-center mt-3 text-warning">Bhalani Enterprises</h4>

        <a href="/dashboard">Dashboard</a>
        <a href="/order">Place Order</a>
        <a href="#">My Orders</a>
        <a class="text-danger" href="/logout">Logout</a>

    </div>
    <div id="overlay"></div>

    <nav class="navbar navbar-light bg-light shadow">

        <div class="container-fluid">

            <button class="btn btn-outline-primary d-md-none" onclick="toggleSidebar()">☰</button>

            <span>Place Order</span>

            <div class="d-flex align-items-center">

                <div class="logo-circle me-2">
                    {{ company[0] }}
                </div>

                <strong>{{ company }}</strong>

            </div>

        </div>

    </nav>


    <div class="content">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>My Orders</h3>

            <a href="/dashboard" class="btn btn-primary">
                Home
            </a>
        </div>

        <form method="POST" onsubmit="showLoader()">

            <div id="products">

                <div class="row mb-2">

                    <div class="col-7">
                        <input name="product_id" class="form-control" placeholder="Product ID" required>
                    </div>

                    <div class="col-5">
                        <input name="qty" class="form-control" placeholder="Qty" required>
                    </div>

                </div>

            </div>

            <button type="button" class="btn btn-secondary mb-3" onclick="addRow()">
                Add Product
            </button>

            <br>

            <button class="btn btn-success">
                Submit Order
            </button>

        </form>

    </div>


    <div id="loader">

        <div class="spinner-border text-primary"></div>

    </div>


    <script>

        function toggleSidebar() {

            const sidebar = document.getElementById("sidebar")
            const overlay = document.getElementById("overlay")

            sidebar.classList.toggle("active")

            if (sidebar.classList.contains("active")) {
                overlay.style.display = "block"
            } else {
                overlay.style.display = "none"
            }

        }

        document.getElementById("overlay").onclick = function () {

            document.getElementById("sidebar").classList.remove("active")
            this.style.display = "none"

        }

        document.addEventListener("click", function (event) {

            const sidebar = document.getElementById("sidebar")
            const button = document.querySelector(".btn-outline-primary")

            if (
                sidebar.classList.contains("active") &&
                !sidebar.contains(event.target) &&
                !button.contains(event.target)
            ) {
                sidebar.classList.remove("active")
            }

        })

        function addRow() {

            var html = `
<div class="row mb-2">

<div class="col-7">
<input name="product_id" class="form-control" placeholder="Product ID">
</div>

<div class="col-5">
<input name="qty" class="form-control" placeholder="Qty">
</div>

</div>
`

            document.getElementById("products").insertAdjacentHTML("beforeend", html)

        }

        function showLoader() {
            document.getElementById("loader").style.display = "flex"
        }

    </script>

</body>

</html>
